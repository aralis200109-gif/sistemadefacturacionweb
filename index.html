<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <div id="factura">

        <div class="header-empresa">
            <h2>SISTEMA DE VENTAS S.A.</h2>
            <p>Villarrica, Paraguay | Tel: 0982770658</p>
            <p><strong>Factura Nro:</strong> <span id="nro-display"></span></p>
        </div>

        <h1>FACTURA</h1>

        <div class="datos-cliente">
           <label for="nombre">Nombre del Cliente (Obligatorio)</label>
             <input type="text" id="nombre" placeholder="Ingrese el nombre del cliente">

            <label for="ruc">RUC o CI</label>
            <input type="text" id="ruc" placeholder="Ingrese RUC o CI">

            <label for="fecha">Fecha</label>
            <input type="date" id="fecha">
        </div>

        <table id="tabla">
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th class="no-print">Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- BOTONES (SIN REPETIR IMPRESIÓN) -->
        <div class="botonera no-print">

            <button id="btn-agregar" class="btn-agregar" onclick="agregarFila()">
                Agregar Producto
            </button>

            <button id="btn-imprimir" class="btn-imprimir" onclick="window.print()">
                Imprimir
            </button>

        </div>

        <div class="totales-container">
            <p>Subtotal: <span id="subtotal">0</span></p>
            <p>IVA (10%): <span id="iva">0</span></p>
            <p><strong>Total Final: <span id="total">0</span></strong></p>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
